server:
  port: 8081

spring:
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  datasource:
    url: jdbc:postgresql://localhost:5432/owldrive?currentSchema=app
    username: owldrive
    password: owldrive_dev_password
  flyway:
    enabled: true
    schemas: app
    create-schemas: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000,http://192.168.*.*:3000,http://10.*.*.*:3000,http://172.*.*.*:3000}
  security:
    oauth2:
      jwt:
        jwk-set-uri: ${APP_SECURITY_OAUTH2_JWT_JWK_SET_URI:${KEYCLOAK_INTERNAL_URL:http://localhost:8080}/realms/owldrive/protocol/openid-connect/certs}
        allowed-issuers: ${APP_SECURITY_OAUTH2_JWT_ALLOWED_ISSUERS:}
        allowed-issuer-patterns: ${APP_SECURITY_OAUTH2_JWT_ALLOWED_ISSUER_PATTERNS:http://localhost:8080/realms/owldrive,http://127.0.0.1:8080/realms/owldrive,http://192.168.*.*:8080/realms/owldrive,http://10.*.*.*:8080/realms/owldrive,http://172.*.*.*:8080/realms/owldrive}
  storage:
    local:
      root: ./data/storage
    max-upload-bytes: 26214400
    reject-empty-files: true
